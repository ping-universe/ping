name: Deploy to Mac Mini

on:
  push:
    branches:
      - prd

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Restart PM2
        run: pm2 restart ecosystem.config.js --env production || pm2 start ecosystem.config.js --env production

      - name: Save PM2 process list
        run: pm2 save

      - name: Health check
        run: |
          sleep 3
          curl -f http://localhost:3000/health || echo "Health check failed"
