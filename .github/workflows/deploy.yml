name: Deploy to Mac Mini

on:
  push:
    branches:
      - prd
      - stg

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Determine environment
        id: env
        run: |
          if [ "${{ github.ref_name }}" = "prd" ]; then
            echo "node_env=production" >> "$GITHUB_OUTPUT"
            echo "label=PRODUCTION" >> "$GITHUB_OUTPUT"
          else
            echo "node_env=staging" >> "$GITHUB_OUTPUT"
            echo "label=STAGING" >> "$GITHUB_OUTPUT"
          fi

      - name: Pull latest code
        run: |
          cd ~/servers/ping-universe
          git fetch origin
          git checkout ${{ github.ref_name }}
          git pull origin ${{ github.ref_name }}

      - name: Install dependencies
        run: |
          cd ~/servers/ping-universe
          npm ci

      - name: Build TypeScript
        run: |
          cd ~/servers/ping-universe
          npm run build

      - name: Restart PM2
        run: |
          cd ~/servers/ping-universe
          pm2 reload ping-universe --update-env || pm2 start ecosystem.config.js
          pm2 save

      - name: Health check
        run: |
          sleep 3
          curl -sf http://localhost:3000/health | jq . || echo "Health check failed"

      - name: Summary
        run: echo "### ✅ ${{ steps.env.outputs.label }} deploy complete" >> "$GITHUB_STEP_SUMMARY"
